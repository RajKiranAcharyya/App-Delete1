name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x ContactsApp/ContactsApp/gradlew

      - name: Build Debug APK
        run: cd ContactsApp/ContactsApp && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ContactsApp-debug
          path: ContactsApp/ContactsApp/app/build/outputs/apk/debug/app-debug.apk
